<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>MJLS Masterclass</title>
    
    <style>
      body {
        background-color: #2c2c2c; 
        font-family: Arial, sans-serif;
        text-align: center; 
        padding: 40px 20px;
      }
    
      h3 {
        color: black; 
        font-size: 4em; 
        margin-bottom: 40px;
        font-weight: 900;
        text-shadow: 0 0 10px #ff8c00, 0 0 20px #ff8c00, 0 0 40px #ff8c00;
      }
    
      /* ALTERAÇÃO PARA COLOCAR LADO A LADO */
      ul { 
        list-style-type: none; 
        padding: 0; 
        display: flex;          /* Ativa o modo Flexbox */
        justify-content: center; /* Centraliza os botões na linha */
        flex-wrap: wrap;       /* Se não couberem todos na mesma linha, eles "pulam" para a de baixo */
        gap: 20px;             /* Cria um espaçamento uniforme entre os botões */
      }
      
      ul li { 
        margin-bottom: 0;      /* Remove a margem inferior antiga */
      }
    
      /* Mantém o estilo dos botões com neon azul */
      ul li a {
        display: inline-block;
        padding: 15px 25px;
        background-color: #ff8c00; 
        color: black;              
        text-decoration: none;
        border-radius: 10px;
        font-weight: bold;
        font-size: 1.1em;
        transition: 0.4s;
        box-shadow: 0 0 5px #00e5ff, 0 0 15px #00e5ff, 0 0 25px #00e5ff;
      }
    
      ul li a:hover {
        transform: scale(1.1);
        box-shadow: 0 0 15px #00e5ff, 0 0 40px #00e5ff, 0 0 70px #00e5ff;
      }
    </style>
  </head>
<body>

</ul>

</body>
</html>
