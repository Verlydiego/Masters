<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>MJLS Masterclass</title>
    
    <style>
      
      body {
        background-color: #2c2c2c; /* Cinza escuro */
        color: #f0f0f0;           /* Cor do texto (quase branco) */
        font-family: Arial, sans-serif;
        padding: 20px;

        text-align: center; 
      }

      h3 {
        color: black; 
        
        /* AUMENTO DA FONTE: mude o valor abaixo para ajustar o tamanho */
        font-size: 4em; 
        
        margin-bottom: 40px;
        font-weight: 900; /* Deixa a fonte mais "grossa" para o neon brilhar mais */
        text-transform: uppercase; /* Opcional: deixa em letras maiúsculas para impacto */
        
        /* Efeito Neon Laranja no Texto */
        text-shadow: 0 0 10px #ff8c00, 
                     0 0 20px #ff8c00, 
                     0 0 40px #ff8c00, 
                     0 0 60px #ff8c00;
      }
      
      ul { list-style-type: none; padding: 0; }

      ul li { 
        margin-bottom: 20px; /* Aumentei a margem para o brilho não sobrepor os outros */
      }

      /* ESTILO DO BOTÃO COM EFEITO NEON */
      ul li a {
        display: inline-block;
        padding: 12px 24px;
        background-color: #ff8c00; /* Botão Laranja */
        color: black;              /* Texto Preto */
        text-decoration: none;
        border-radius: 8px;
        font-weight: bold;
        transition: 0.4s;
    
        /* O EFEITO NEON AZUL CLARO ABAIXO */
        box-shadow: 0 0 5px #00e5ff, 
                    0 0 15px #00e5ff, 
                    0 0 25px #00e5ff;
      }
      
      ul li a:hover {
        transform: scale(1.05);
        box-shadow: 0 0 10px #00e5ff, 
                    0 0 30px #00e5ff, 
                    0 0 50px #00e5ff; /* O brilho expande no hover */
      }
    </style>
  </head>
<body>
<h1>MJLS:</h1>

<ul>

  <li><a href="MJLS/aula02/">MJLS - Class 2</a></li>
  <li><a href="MJLS/aula03/">MJLS - Class 3</a></li>
  <li><a href="MJLS/aula04/">MJLS - Class 4</a></li>
  <li><a href="MJLS/aula05/">MJLS - Class 5</a></li>
</ul>

</body>
</html>
