<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>MJLS Masterclass</title>
    
    <style>
      /* Define o fundo como preto total */
      body {
        background-color: black !important; 
        font-family: 'Montserrat', sans-serif;
        text-align: center; 
        padding: 60px 20px; /* Aumentei o recuo superior já que não tem mais título */
        margin: 0;
      }
    
      /* Container dos botões das aulas */
      ul { 
        list-style-type: none; 
        padding: 0; 
        display: flex;          
        justify-content: center; 
        flex-wrap: wrap;       
        gap: 30px; 
      }
    
      /* Estilo dos botões MJLS (Class 1 a 5) */
      ul li a {
        display: inline-block;
        padding: 20px 40px;
        font-size: 1.5em;
        background-color: #ff8c00; /* Laranja */
        color: black;              /* Texto Preto */
        text-decoration: none;
        border-radius: 12px;
        font-weight: bold;
        transition: 0.4s;
        
        /* Efeito Neon Azul Claro (destaca muito no fundo preto) */
        box-shadow: 0 0 15px #00e5ff, 
                    0 0 30px #00e5ff, 
                    0 0 45px #00e5ff;
      }
    
      ul li a:hover {
        transform: scale(1.1);
        box-shadow: 0 0 25px #00e5ff, 
                    0 0 60px #00e5ff, 
                    0 0 90px #00e5ff;
      }
    </style>
  </head>
<body>
  
<p>&nbsp;</p>
<ul>

  <li><a href="MJLS/aula02/">MJLS - Class 2</a></li>
  <li><a href="MJLS/aula03/">MJLS - Class 3</a></li>
  <li><a href="MJLS/aula04/">MJLS - Class 4</a></li>
  <li><a href="MJLS/aula05/">MJLS - Class 5</a></li>
</ul>

</body>
</html>
